<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Battle Arena</title>

  <!-- External CDN dependencies -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/tone@latest/build/Tone.js"></script>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;700&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind is processed by the Vite plugin via src/index.css -->

  <!-- Legacy stylesheet -->
  <link rel="stylesheet" href="/style.css">
</head>
<body class="font-pixel text-white bg-slate-900 min-h-screen overflow-x-hidden">
  <!-- React mounts here -->
  <div id="root"></div>

  <!--
    React entry point (Vite-processed).
    React renders the full DOM skeleton first, then signals readiness
    via window.__reactReady = true, at which point script.js bootstraps
    the legacy engine (see ArenaContext.jsx).
  -->
  <script type="module" src="/src/main.jsx"></script>

  <!--
    Legacy engine entry point.
    script.js calls loadGameData() which injects the data files as plain
    <script> tags (relative to the document origin), then instantiates
    PokemonBattleArena and sets window.arena.
    We defer it so it runs after React's module has registered its hooks.
  -->
  <script type="module" src="/script.js" defer></script>
</body>
</html>
